<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08090d;
  --bg2:#0f1117;
  --bg3:#151821;
  --bg4:#1c2030;
  --bg5:#232840;
  --panel:#111420;
  --border:#1f2436;
  --border2:#2a3050;
  --border3:#353d60;
  --a1:#3d7fff;
  --a2:#6b4fff;
  --a3:#00e5b0;
  --a4:#ff6b6b;
  --a5:#ffb347;
  --text:#eef0f8;
  --t2:#8890b0;
  --t3:#4a5270;
  --t4:#2e3455;
  --green:#1fd17a;
  --red:#ff4f6d;
  --amber:#f5a623;
  --purple:#8b5cf6;
  --r:10px;
  --rc:14px;
  --rl:18px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Cabinet Grotesk',sans-serif;font-size:14px;line-height:1.5;overflow:hidden}
h1,h2,h3,h4,.display{font-family:'Clash Display',sans-serif;letter-spacing:-0.02em}
button{cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;font-size:14px}
input,textarea,select{font-family:'Cabinet Grotesk',sans-serif;font-size:14px;outline:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:232px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;transition:width .25s}
.sidebar.collapsed{width:60px}
.main{flex:1;overflow-y:auto;overflow-x:hidden}
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;background:var(--bg2);position:sticky;top:0;z-index:50}
.content{padding:28px 28px 60px}

/* Sidebar */
.logo-area{padding:20px 16px 8px;display:flex;align-items:center;gap:10px;min-height:60px}
.logo-mark{width:32px;height:32px;border-radius:9px;overflow:hidden;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.logo-text{font-family:'Clash Display';font-size:16px;font-weight:700;background:linear-gradient(120deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.nav-section{padding:8px 10px 4px;margin-top:4px}
.nav-label{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:0 6px;margin-bottom:4px;white-space:nowrap;overflow:hidden}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);border:none;background:transparent;color:var(--t2);width:100%;text-align:left;transition:all .15s;position:relative;white-space:nowrap;overflow:hidden}
.nav-btn:hover{background:var(--bg4);color:var(--text)}
.nav-btn.active{background:linear-gradient(120deg,#3d7fff18,#6b4fff18);color:var(--a1);border:1px solid #3d7fff22}
.nav-btn .icon{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.nav-btn .badge{margin-left:auto;background:var(--a1);color:white;border-radius:99px;padding:1px 7px;font-size:10px;font-weight:600}
.sidebar-footer{margin-top:auto;padding:12px 10px 16px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:background .15s}
.user-chip:hover{background:var(--bg4)}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:white;flex-shrink:0}
.avatar.lg{width:44px;height:44px;font-size:18px}
.avatar.xl{width:72px;height:72px;font-size:28px;border-radius:20px}

/* Cards */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rc)}
.card-hover{transition:border-color .15s,transform .15s,box-shadow .15s;cursor:pointer}
.card-hover:hover{border-color:var(--border3);transform:translateY(-1px);box-shadow:0 8px 32px #0006}

/* Buttons */
.btn{border:none;border-radius:var(--r);padding:8px 16px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:linear-gradient(135deg,var(--a1),var(--a2));color:white}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--bg4);color:var(--text)}
.btn-sm{padding:5px 12px;font-size:13px;border-radius:8px}
.btn-danger{background:#ff4f6d18;color:var(--red);border:1px solid #ff4f6d33}
.btn-success{background:#1fd17a18;color:var(--green);border:1px solid #1fd17a33}
.btn-xs{padding:3px 9px;font-size:12px;border-radius:6px}

/* Inputs */
.inp{background:var(--bg4);border:1px solid var(--border);border-radius:var(--r);padding:9px 13px;color:var(--text);width:100%;transition:border-color .15s}
.inp:focus{border-color:var(--a1)}
.inp::placeholder{color:var(--t3)}
.inp-group{display:flex;flex-direction:column;gap:5px}
.inp-label{font-size:12px;color:var(--t2);font-weight:500}
.select{appearance:none;background:var(--bg4);border:1px solid var(--border);border-radius:var(--r);padding:9px 32px 9px 13px;color:var(--text);width:100%;cursor:pointer}

/* Badges */
.badge{border-radius:99px;padding:2px 10px;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.badge-blue{background:#3d7fff1a;color:#6b9fff;border:1px solid #3d7fff30}
.badge-purple{background:#8b5cf61a;color:#a78bfa;border:1px solid #8b5cf630}
.badge-green{background:#1fd17a1a;color:#4ade80;border:1px solid #1fd17a30}
.badge-amber{background:#f5a6231a;color:#fbbf24;border:1px solid #f5a62330}
.badge-red{background:#ff4f6d1a;color:#f87171;border:1px solid #ff4f6d30}
.badge-gray{background:#1c2030;color:var(--t2);border:1px solid var(--border2)}

/* Misc */
.divider{height:1px;background:var(--border);margin:16px 0}
.pill{border-radius:99px;padding:4px 12px;font-size:12px;background:var(--bg5);color:var(--t2);border:1px solid var(--border)}
.tag{background:var(--bg5);color:var(--t2);border-radius:6px;padding:3px 9px;font-size:12px}
.match-ring{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:50%;font-family:'Clash Display';font-size:13px;font-weight:700}
.progress-bar{height:5px;background:var(--bg5);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .6s}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.flex{display:flex;align-items:center}
.gap-8{gap:8px}
.gap-12{gap:12px}
.gap-16{gap:16px}
.mt-4{margin-top:4px}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}
.mt-20{margin-top:20px}
.mb-4{margin-bottom:4px}
.mb-8{margin-bottom:8px}
.mb-12{margin-bottom:12px}
.mb-16{margin-bottom:16px}
.mb-20{margin-bottom:20px}
.text-sm{font-size:13px}
.text-xs{font-size:12px}
.text-muted{color:var(--t2)}
.text-hint{color:var(--t3)}
.font-medium{font-weight:500}
.font-bold{font-weight:700}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.section-title{font-family:'Clash Display';font-size:17px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title .sub{font-family:'Cabinet Grotesk';font-size:13px;font-weight:400;color:var(--t2);margin-left:auto}

/* Stat card */
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rc);padding:18px;position:relative;overflow:hidden}
.stat-val{font-family:'Clash Display';font-size:28px;font-weight:700;line-height:1}
.stat-label{font-size:12px;color:var(--t2);margin-top:4px}
.stat-change{font-size:12px;margin-top:8px}
.stat-glow{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.06;filter:blur(20px)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);max-height:90vh;overflow-y:auto;width:100%;max-width:620px;box-shadow:0 40px 80px #000a}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--bg4);border-radius:10px;padding:3px;margin-bottom:20px}
.tab{flex:1;text-align:center;padding:7px 12px;border-radius:8px;border:none;background:transparent;color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px #0005}

/* AI Chat */
.chat-bubble{padding:12px 16px;border-radius:12px;max-width:86%;line-height:1.6;font-size:14px}
.chat-bubble.ai{background:var(--bg4);color:var(--text);border-bottom-left-radius:3px}
.chat-bubble.user{background:linear-gradient(135deg,var(--a1),var(--a2));color:white;border-bottom-right-radius:3px;margin-left:auto}

/* Toggle */
.toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer}
.toggle{width:36px;height:20px;background:var(--bg5);border-radius:99px;position:relative;transition:background .2s;border:1px solid var(--border2)}
.toggle.on{background:var(--a1);border-color:var(--a1)}
.toggle-knob{width:14px;height:14px;background:white;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s}
.toggle.on .toggle-knob{left:18px}

/* Profile strength */
.strength-segment{height:6px;border-radius:99px;flex:1;background:var(--bg5);transition:background .3s}

/* Skill bars */
.skill-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.skill-name{width:120px;font-size:13px;color:var(--t2);flex-shrink:0}
.skill-bar{flex:1;height:4px;background:var(--bg5);border-radius:99px;overflow:hidden}
.skill-fill{height:100%;border-radius:99px}

/* Notification dot */
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--red);position:absolute;top:8px;right:8px;border:2px solid var(--bg2)}

/* Kanban */
.kanban-col{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rc);padding:14px;min-height:300px}
.kanban-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.kanban-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kanban-card{background:var(--bg4);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.kanban-card:hover{border-color:var(--border3)}

/* Interview practice */
.practice-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rc);padding:20px}
.difficulty-btn{padding:5px 14px;border-radius:99px;border:1px solid;font-size:12px;cursor:pointer;transition:all .15s}

/* Salary tool */
.salary-bar{height:36px;border-radius:8px;position:relative;overflow:hidden}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes glow{0%,100%{box-shadow:0 0 12px #3d7fff44}50%{box-shadow:0 0 24px #3d7fff88}}
.fade-up{animation:fadeUp .3s ease both}
.fade-in{animation:fadeIn .2s ease}
.spinning{animation:spin 1s linear infinite}
.pulsing{animation:pulse 1.5s ease-in-out infinite}
.glowing{animation:glow 2s ease-in-out infinite}
.skeleton{background:linear-gradient(90deg,var(--bg4) 25%,var(--bg5) 50%,var(--bg4) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}

/* Responsive */
@media(max-width:900px){
  .sidebar{display:none}
  .grid-4{grid-template-columns:1fr 1fr}
  .grid-3{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .content{padding:16px}
}
</style>
</head>

const callAI=async(prompt,onChunk)=>{
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});

const useLocalStorage=(key,init)=>{
  const [v,sv]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
  const set=useCallback(x=>{const val=typeof x==="function"?x(v):x;sv(val);try{localStorage.setItem(key,JSON.stringify(val));}catch{};},[key]);
  return[v,set];
};

const Tooltip=({text,children})=>{
  const [show,setShow]=useState(false);
  return <div style={{position:"relative",display:"inline-flex"}} onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}>
    {children}
    {show&&<div style={{position:"absolute",bottom:"100%",left:"50%",transform:"translateX(-50%)",background:vr("--bg5"),border:"1px solid var(--border2)",borderRadius:7,padding:"5px 9px",fontSize:12,color:"var(--text)",whiteSpace:"nowrap",marginBottom:4,zIndex:999}}>{text}</div>}
  </div>;
};
const vr=v=>v; // passthrough for readability

/* ─── TYPING EFFECT ─────────────────────────────────────────── */
const Typing=({text,speed=10,done})=>{
  const [s,setS]=useState("");
  useEffect(()=>{setS("");let i=0;const t=setInterval(()=>{i++;setS(text.slice(0,i));if(i>=text.length){clearInterval(t);if(done)done();}},speed);return()=>clearInterval(t);},[text]);
  return <>{s}{s.length<text.length&&<span style={{animation:"blink 1s step-end infinite"}}>▌</span>}</>;
};

/* ─── JOB CARD ───────────────────────────────────────────────── */
const JobCard=({job,onSave,onApply,onSelect,compact=false})=>(
  <div className={`card card-hover fade-up`} style={{padding:compact?"14px":"20px"}} onClick={()=>onSelect(job)}>
    <div className="flex gap-12">
      <CompLogo logo={job.logo} color={job.color} size={compact?38:46}/>
      <div style={{flex:1,minWidth:0}}>
        <div className="flex gap-8" style={{flexWrap:"wrap",marginBottom:3}}>
          <span style={{fontFamily:"Clash Display",fontSize:compact?14:16,fontWeight:600}}>{job.title}</span>
          <MatchBadge score={job.match}/>
          {job.featured&&<span className="badge badge-purple" style={{fontSize:10}}>Featured</span>}
        </div>
        <div className="text-sm text-muted">{job.company} · {job.location}</div>
        {!compact&&(
          <>
            <div className="text-sm" style={{color:"var(--t2)",marginTop:8,lineHeight:1.6}}>{job.desc.slice(0,120)}...</div>
            <div className="flex gap-8 mt-8" style={{flexWrap:"wrap"}}>
              <span className="pill">{job.type}</span>
              <span style={{color:"var(--a3)",fontSize:13,fontWeight:500}}>{job.salary}</span>
              {job.tags.map(t=><span key={t} className="tag">{t}</span>)}
            </div>
            <div className="flex gap-12 mt-8" style={{color:"var(--t3)",fontSize:12}}>
              <span>📅 {job.posted}</span>
              <span>👥 {job.applicants} applicants</span>
            </div>
          </>
        )}
        {compact&&(
          <div className="flex gap-8 mt-4">
            <span className="pill" style={{fontSize:11,padding:"2px 8px"}}>{job.type}</span>
            <span style={{color:"var(--a3)",fontSize:12}}>{job.salary}</span>
          </div>
        )}
      </div>
      <div className="flex gap-8" style={{flexShrink:0,alignSelf:"flex-start"}} onClick={e=>e.stopPropagation()}>
        <button className="btn btn-ghost btn-sm" onClick={()=>onSave(job.id)} style={{color:job.saved?"var(--a4)":"var(--t2)"}}>
          {job.saved?"♥":"♡"}
        </button>
        {!compact&&(
          <button className={`btn btn-sm ${job.applied?"btn-ghost":"btn-primary"}`} onClick={()=>onApply(job.id)}>
            {job.applied?"✓ Applied":"Apply"}
          </button>
        )}
      </div>
    </div>
  </div>
);

/* ─── JOB DETAIL MODAL ───────────────────────────────────────── */
const JobDetailModal=({job,onClose,setPage,setContextJob,jobs,setJobs})=>{
  if(!job)return null;
  const [tab,setTab]=useState("overview");
  return(
    <div className="modal-bg fade-in" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{padding:"24px 24px 0"}}>
          <div className="flex gap-16" style={{marginBottom:16}}>
            <CompLogo logo={job.logo} color={job.color} size={56} radius={14}/>
            <div style={{flex:1}}>
              <div style={{fontFamily:"Clash Display",fontSize:20,fontWeight:700}}>{job.title}</div>
              <div className="text-muted">{job.company} · {job.location}</div>
              <div className="flex gap-8 mt-8">
                <MatchBadge score={job.match}/>
                <span className="pill">{job.type}</span>
                <span style={{color:"var(--a3)",fontWeight:500}}>{job.salary}</span>
              </div>
            </div>
            <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
          </div>
          <div className="tabs">
            {["overview","requirements","perks","culture"].map(t=>(
              <button key={t} className={`tab ${tab===t?"active":""}`} onClick={()=>setTab(t)} style={{textTransform:"capitalize"}}>{t}</button>
            ))}
          </div>
        </div>
        <div style={{padding:"0 24px 20px"}}>
          {tab==="overview"&&<div>
            <p style={{lineHeight:1.7,color:"var(--t2)",marginBottom:16}}>{job.desc}</p>
            <div className="flex gap-8" style={{flexWrap:"wrap",marginBottom:16}}>
              {job.tags.map(t=><span key={t} className="badge badge-blue">{t}</span>)}
            </div>
            <div className="flex gap-12" style={{color:"var(--t2)",fontSize:13}}>
              <span>📅 Posted {job.posted}</span>
              <span>👥 {job.applicants} applicants</span>
            </div>
          </div>}
          {tab==="requirements"&&<ul style={{paddingLeft:18,color:"var(--t2)",lineHeight:1.9}}>
            {job.requirements.map((r,i)=><li key={i}>{r}</li>)}
          </ul>}
          {tab==="perks"&&<div className="grid-2">
            {job.perks.map((p,i)=><div key={i} className="flex gap-8" style={{background:"var(--bg4)",borderRadius:8,padding:"10px 12px"}}>
              <span>✓</span><span style={{color:"var(--t2)",fontSize:13}}>{p}</span>
            </div>)}
          </div>}
          {tab==="culture"&&<div style={{background:"var(--bg4)",borderRadius:10,padding:16,color:"var(--t2)",lineHeight:1.7}}>{job.culture}</div>}
        </div>
        <div className="divider" style={{margin:0}}/>
        <div style={{padding:16,display:"flex",gap:8,flexWrap:"wrap"}}>
          <button className="btn btn-primary" onClick={()=>{setJobs(prev=>prev.map(j=>j.id===job.id?{...j,applied:true}:j));onClose();}}>
            {job.applied?"✓ Applied":"Apply Now"}
          </button>
          <button className="btn btn-ghost btn-sm" onClick={()=>{onClose();setContextJob(job);setPage("cover");}}>✦ Cover Letter</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>{onClose();setContextJob(job);setPage("insights");}}>◉ Research</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>{onClose();setContextJob(job);setPage("cv");}}>◧ Tailor CV</button>
          <button className="btn btn-ghost btn-sm" style={{marginLeft:"auto"}} onClick={()=>{setJobs(prev=>prev.map(j=>j.id===job.id?{...j,saved:!j.saved}:j));}}>
            {job.saved?"♥ Saved":"♡ Save"}
          </button>
        </div>
      </div>
    </div>
  );
};

/* ─── DASHBOARD ──────────────────────────────────────────────── */
const Dashboard=({jobs,apps,setPage,setContextJob,profile})=>{
  const upcoming=apps.filter(a=>a.interview&&new Date(a.interview)>=new Date());
  const totalApps=apps.length;
  const interviews=apps.filter(a=>["Interviewing","Offer"].includes(a.status)).length;
  const offers=apps.filter(a=>a.status==="Offer").length;
  const topJobs=useMemo(()=>[...jobs].sort((a,b)=>b.match-a.match).slice(0,5),[jobs]);
  return(
    <div>
      {/* Hero */}
      <div style={{marginBottom:28}}>
        <div className="flex gap-8 mb-8" style={{color:"var(--t2)",fontSize:13}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:"var(--green)",boxShadow:"0 0 8px var(--green)",marginTop:3}}/>

/* ─── JOB SEARCH ─────────────────────────────────────────────── */
const JobSearch=({jobs,setJobs,onSelect})=>{
  const [q,setQ]=useState("");
  const [type,setType]=useState("All");
  const [sort,setSort]=useState("match");
  const [minMatch,setMinMatch]=useState(0);
  const [showFilters,setShowFilters]=useState(false);
  const filtered=useMemo(()=>{
    let r=jobs.filter(j=>{
      const sq=q.toLowerCase();
      return(!sq||j.title.toLowerCase().includes(sq)||j.company.toLowerCase().includes(sq)||j.tags.some(t=>t.toLowerCase().includes(sq)))
        &&(type==="All"||j.type===type)&&j.match>=minMatch;
    });
    if(sort==="match")r.sort((a,b)=>b.match-a.match);
    else if(sort==="recent")r.sort((a,b)=>a.id-b.id);
    return r;
  },[jobs,q,type,sort,minMatch]);
  return(
    <div>
      <div className="flex gap-12 mb-16" style={{flexWrap:"wrap"}}>
        <h2 style={{fontFamily:"Clash Display",fontSize:22,fontWeight:700,flex:1}}>Job Search</h2>
        <span className="text-sm text-muted" style={{alignSelf:"center"}}>{filtered.length} results</span>
      </div>

      {/* Search bar */}
      <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:12,padding:14,marginBottom:12}}>
        <div className="flex gap-10" style={{marginBottom:showFilters?12:0}}>
          <div style={{flex:1,position:"relative"}}>
            <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"var(--t3)"}}>◎</span>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search roles, companies, skills…" className="inp" style={{paddingLeft:34}}/>
          </div>
          <select value={type} onChange={e=>setType(e.target.value)} className="inp" style={{width:130}}>
            {["All","Remote","Hybrid","On-site"].map(t=><option key={t}>{t}</option>)}
          </select>
          <button className={`btn btn-ghost btn-sm`} onClick={()=>setShowFilters(v=>!v)}>⚙ Filters</button>
        </div>
        {showFilters&&(
          <div className="flex gap-16" style={{flexWrap:"wrap"}}>
            <div className="inp-group" style={{flex:1}}>
              <label className="inp-label">Min Match Score: {minMatch}%</label>
              <input type="range" min={0} max={95} step={5} value={minMatch} onChange={e=>setMinMatch(+e.target.value)} style={{width:"100%",accentColor:"var(--a1)"}}/>
            </div>
            <div className="inp-group" style={{flex:1}}>
              <label className="inp-label">Sort By</label>
              <select value={sort} onChange={e=>setSort(e.target.value)} className="select">
                <option value="match">AI Match Score</option>
                <option value="recent">Most Recent</option>
              </select>
            </div>
          </div>
        )}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {filtered.length===0&&<EmptyState icon="◎" title="No jobs found" sub="Try adjusting your filters or search term"/>}
        {filtered.map(j=>(
          <JobCard key={j.id} job={j} onSelect={onSelect}
            onSave={id=>setJobs(p=>p.map(j=>j.id===id?{...j,saved:!j.saved}:j))}
            onApply={id=>setJobs(p=>p.map(j=>j.id===id?{...j,applied:!j.applied}:j))}/>
        ))}
      </div>
    </div>
  );
};

/* ─── SAVED JOBS ─────────────────────────────────────────────── */
const SavedJobs=({jobs,setJobs,onSelect})=>{
  const saved=jobs.filter(j=>j.saved);
  return(
    <div>
      <h2 style={{fontFamily:"Clash Display",fontSize:22,fontWeight:700,marginBottom:16}}>Saved Jobs ({saved.length})</h2>
      {saved.length===0?<EmptyState icon="♡" title="No saved jobs yet" sub="Heart a job in the search to save it here"/>:
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {saved.map(j=><JobCard key={j.id} job={j} onSelect={onSelect}
            onSave={id=>setJobs(p=>p.map(j=>j.id===id?{...j,saved:false}:j))}
            onApply={id=>setJobs(p=>p.map(j=>j.id===id?{...j,applied:!j.applied}:j))}/>)}
        </div>}
    </div>
  );
};

/* ─── APP TRACKER ────────────────────────────────────────────── */
const AppTracker=({apps,setApps})=>{
  const [view,setView]=useState("kanban");
  const [modal,setModal]=useState(null);
  const [adding,setAdding]=useState(false);
  const [form,setForm]=useState({title:"",company:"",status:"Applied",notes:"",interview:"",salary:"",url:""});

  const addApp=()=>{
    if(!form.title||!form.company)return;
    setApps(p=>[...p,{...form,id:Date.now(),date:new Date().toISOString().slice(0,10),contacts:[]}]);
    setForm({title:"",company:"",status:"Applied",notes:"",interview:"",salary:"",url:""});
    setAdding(false);
  };
  const totalApps=apps.length;
  const successRate=totalApps?Math.round((apps.filter(a=>a.status==="Offer").length/totalApps)*100):0;

    <div>

        <h2 style={{fontFamily:"Clash Display",fontSize:22,fontWeight:700,flex:1}}>Application Tracker</h2>
        <div className="tabs" style={{margin:0,width:"auto",flex:"none"}}>
          <button className={`tab ${view==="kanban"?"active":""}`} onClick={()=>setView("kanban")}>Kanban</button>
          <button className={`tab ${view==="list"?"active":""}`} onClick={()=>setView("list")}>List</button>
        </div>
        <button className="btn btn-primary btn-sm" onClick={()=>setAdding(true)}>+ Add</button>
      </div>

      {/* Mini stats */}
      <div className="grid-4 mb-20">
        {[
          {l:"Total",v:totalApps,c:"var(--a1)"},
          {l:"Active",v:apps.filter(a=>["Applied","Interviewing"].includes(a.status)).length,c:"var(--a5)"},
          {l:"Offers",v:apps.filter(a=>a.status==="Offer").length,c:"var(--green)"},
          {l:"Success Rate",v:`${successRate}%`,c:"var(--purple)"},
        ].map(s=><div key={s.l} style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:10,padding:14}}>
          <div style={{fontFamily:"Clash Display",fontSize:22,fontWeight:700,color:s.c}}>{s.v}</div>
          <div className="text-xs text-hint">{s.l}</div>
        </div>)}

      {adding&&(
        <div className="card" style={{padding:20,marginBottom:16}}>
          <div style={{fontFamily:"Clash Display",fontWeight:600,marginBottom:14}}>New Application</div>
          <div className="grid-2" style={{marginBottom:10}}>
            <div className="inp-group"><label className="inp-label">Job Title *</label><input value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} className="inp" placeholder="Frontend Engineer"/></div>
            <div className="inp-group"><label className="inp-label">Company *</label><input value={form.company} onChange={e=>setForm(p=>({...p,company:e.target.value}))} className="inp" placeholder="Stripe"/></div>
          </div>
          <div className="grid-2" style={{marginBottom:10}}>
            <div className="inp-group"><label className="inp-label">Status</label>
              <select value={form.status} onChange={e=>setForm(p=>({...p,status:e.target.value}))} className="inp">
                {cols.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="inp-group"><label className="inp-label">Salary</label><input value={form.salary} onChange={e=>setForm(p=>({...p,salary:e.target.value}))} className="inp" placeholder="£70k"/></div>
          </div>
          <div className="grid-2" style={{marginBottom:10}}>
            <div className="inp-group"><label className="inp-label">Interview Date</label><input type="date" value={form.interview} onChange={e=>setForm(p=>({...p,interview:e.target.value}))} className="inp"/></div>
            <div className="inp-group"><label className="inp-label">Job URL</label><input value={form.url} onChange={e=>setForm(p=>({...p,url:e.target.value}))} className="inp" placeholder="https://…"/></div>
          </div>
          <div className="inp-group" style={{marginBottom:12}}>
            <label className="inp-label">Notes</label>
            <textarea value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} className="inp" style={{height:70,resize:"none"}} placeholder="Any notes about this application…"/>
          </div>
          <div className="flex gap-8">
            <button className="btn btn-primary btn-sm" onClick={addApp}>Save Application</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>setAdding(false)}>Cancel</button>
          </div>
        </div>
      )}

      {view==="kanban"&&(
        <div className="grid-4">
          {cols.map(col=>{
            const colApps=apps.filter(a=>a.status===col);
            return(
              <div key={col} className="kanban-col">
                <div className="kanban-header">
                  <div className="kanban-dot" style={{background:statusColor[col]}}/>
                  <span className="font-medium text-sm">{col}</span>
                  <span className="text-xs text-hint" style={{marginLeft:"auto"}}>{colApps.length}</span>
                </div>
                {colApps.length===0&&<div className="text-xs text-hint" style={{textAlign:"center",padding:"20px 0"}}>No applications</div>}
                {colApps.map(a=>(
                  <div key={a.id} className="kanban-card" onClick={()=>setModal(a)}>
                    <div className="text-sm font-medium">{a.title}</div>
                    <div className="text-xs text-hint mt-4">{a.company}</div>
                    {a.salary&&<div className="text-xs" style={{color:"var(--a3)",marginTop:4}}>{a.salary}</div>}
                    {a.interview&&<div className="text-xs" style={{color:"var(--a5)",marginTop:4}}>📅 {fmtDate(a.interview)}</div>}
                    <div className="text-xs text-hint" style={{marginTop:6}}>Applied {fmtDate(a.date)}</div>
                  </div>
                ))}
              </div>
            );
          })}
        </div>

      {view==="list"&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {apps.map(a=>(
            <div key={a.id} className="card" style={{padding:"14px 16px",cursor:"pointer"}} onClick={()=>setModal(a)}>
              <div className="flex gap-12">
                <div style={{flex:1}}>
                  <div className="flex gap-8">
                    <span className="font-medium">{a.title}</span>
                    <span className="text-muted">at</span>
                    <span className="font-medium">{a.company}</span>
                    {a.salary&&<span style={{color:"var(--a3)",fontSize:13}}>{a.salary}</span>}
                  </div>
                  {a.notes&&<div className="text-xs text-hint mt-4" style={{maxWidth:400}}>{a.notes.slice(0,80)}…</div>}
                </div>
                <div className="flex gap-8">
                  {a.interview&&<span className="text-xs" style={{color:"var(--a5)"}}>📅 {fmtDate(a.interview)}</span>}
                  <StatusBadge status={a.status}/>
                  <span className="text-xs text-hint">{fmtDate(a.date)}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {modal&&(
        <div className="modal-bg fade-in" onClick={()=>setModal(null)}>
          <div className="modal" style={{maxWidth:520}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:24}}>
              <div className="flex gap-12 mb-16">
                <div>
                  <div style={{fontFamily:"Clash Display",fontSize:18,fontWeight:700}}>{modal.title}</div>
                  <div className="text-muted">{modal.company}</div>
                </div>
                <button className="btn btn-ghost btn-sm" style={{marginLeft:"auto"}} onClick={()=>setModal(null)}>✕</button>
              </div>
              <div className="grid-2 mb-12">
                <div><div className="inp-label mb-4">Status</div>
                  <select value={modal.status} onChange={e=>{const s=e.target.value;setApps(p=>p.map(a=>a.id===modal.id?{...a,status:s}:a));setModal(m=>({...m,status:s}));}} className="inp">
                    {cols.map(c=><option key={c}>{c}</option>)}
                  </select>
                </div>
                <div><div className="inp-label mb-4">Interview Date</div>
                  <input type="date" value={modal.interview||""} onChange={e=>{const v=e.target.value;setApps(p=>p.map(a=>a.id===modal.id?{...a,interview:v}:a));setModal(m=>({...m,interview:v}));}} className="inp"/>
                </div>
              </div>
              <div className="inp-group mb-12">
                <label className="inp-label">Notes</label>
                <textarea value={modal.notes} onChange={e=>{const v=e.target.value;setApps(p=>p.map(a=>a.id===modal.id?{...a,notes:v}:a));setModal(m=>({...m,notes:v}));}} className="inp" style={{height:90,resize:"none"}}/>
              </div>
              {modal.contacts?.length>0&&(
                <div>
                  <div className="inp-label mb-8">Contacts</div>
                  {modal.contacts.map((c,i)=>(
                    <div key={i} className="flex gap-10" style={{background:"var(--bg4)",borderRadius:8,padding:"10px 12px",marginBottom:6}}>
                      <div className="avatar" style={{width:28,height:28,fontSize:11}}>{c.name[0]}</div>
                      <div>
                        <div className="text-sm font-medium">{c.name}</div>
                        <div className="text-xs text-hint">{c.role} · {c.email}</div>
                      </div>
                    </div>
                  ))}

              )}
              <div className="flex gap-8 mt-16">
                <button className="btn btn-danger btn-sm" onClick={()=>{setApps(p=>p.filter(a=>a.id!==modal.id));setModal(null);}}>Delete</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );

/* ─── CV BUILDER ─────────────────────────────────────────────── */
const CVBuilder=({contextJob,profile})=>{
  const [tone,setTone]=useState("Professional");
  const [focus,setFocus]=useState("technical");
  const [loading,setLoading]=useState(false);
  const [cv,setCv]=useState("");
  const [editing,setEditing]=useState(false);
  const generate=async()=>{
    setLoading(true);setCv("");
    const jobInfo=contextJob?`for the role of ${contextJob.title} at ${contextJob.company}. Required skills: ${contextJob.tags?.join(", ")}. Job description: ${contextJob.desc}`:"for a general frontend / software engineering role";
    const prompt=`Generate a tailored, ${tone.toLowerCase()} CV ${jobInfo}. 

Candidate profile:
- Name: ${profile.name}
- Degree: ${profile.degree} from ${profile.university} (${profile.gradYear})
- Skills: ${profile.skills.join(", ")}
- Experience: ${profile.experience}
- Bio: ${profile.bio}

Format the CV clearly with these sections:
1. PROFESSIONAL SUMMARY (3 sentences, ${tone.toLowerCase()} tone)
2. TECHNICAL SKILLS (organised by category, highlight skills matching the job)
3. EDUCATION
4. EXPERIENCE (2-3 bullet points per role, with measurable impact)
5. PROJECTS (2-3 relevant projects with tech stack)
6. ADDITIONAL

Use --- as section dividers. Keep bullet points punchy and impact-focused. ${focus==="technical"?"Emphasise technical depth and engineering achievements.":"Emphasise collaboration, communication, and business impact."}`;
    await callAI(prompt,setCv);
    setLoading(false);
  };
  return(
    <div>
      <div className="flex gap-12 mb-4">
        <h2 style={{fontFamily:"Clash Display",fontSize:22,fontWeight:700}}>AI CV Builder</h2>
        <AIBadge/>
      </div>
      <p className="text-muted mb-20">Generate a tailored CV optimised with AI for any role.</p>

      {contextJob&&(
        <div style={{background:"linear-gradient(135deg,#3d7fff12,#6b4fff12)",border:"1px solid #3d7fff25",borderRadius:12,padding:"12px 16px",marginBottom:16}} className="flex gap-12">
          <CompLogo logo={contextJob.logo} color={contextJob.color} size={36} radius={8}/>
          <div>
            <div className="text-sm font-medium">Tailoring for: {contextJob.title} at {contextJob.company}</div>
            <div className="text-xs text-muted">CV will be optimised for this specific role</div>
          </div>
        </div>
      )}

      <div className="card" style={{padding:20,marginBottom:16}}>
        <div style={{fontFamily:"Clash Display",fontWeight:600,marginBottom:14}}>Generation Settings</div>
        <div className="grid-2 mb-16">
          <div className="inp-group">
            <label className="inp-label">Tone</label>
            <div className="flex gap-8" style={{flexWrap:"wrap",marginTop:4}}>
              {["Professional","Confident","Technical","Concise"].map(t=>(
                <button key={t} onClick={()=>setTone(t)} className="btn btn-xs" style={{background:tone===t?"var(--a1)":"var(--bg5)",color:tone===t?"white":"var(--t2)",border:tone===t?"1px solid var(--a1)":"1px solid var(--border)",borderRadius:99}}>{t}</button>
              ))}
            </div>
          </div>
          <div className="inp-group">
            <label className="inp-label">Focus</label>
            <div className="flex gap-8" style={{flexWrap:"wrap",marginTop:4}}>
              {[{v:"technical",l:"Technical Depth"},{v:"impact",l:"Business Impact"}].map(f=>(
                <button key={f.v} onClick={()=>setFocus(f.v)} className="btn btn-xs" style={{background:focus===f.v?"var(--a2)":"var(--bg5)",color:focus===f.v?"white":"var(--t2)",border:focus===f.v?"1px solid var(--a2)":"1px solid var(--border)",borderRadius:99}}>{f.l}</button>
              ))}
            </div>
          </div>
        </div>
        <button onClick={generate} disabled={loading} className="btn btn-primary" style={{width:"100%",justifyContent:"center",opacity:loading?.7:1}}>
          {loading?<><Spinner size={15}/> Generating your CV…</>:<>✦ Generate CV with AI</>}
        </button>
      </div>

      {cv&&(
        <div className="card" style={{padding:20}}>
          <div className="flex gap-10 mb-16">
            <span style={{fontFamily:"Clash Display",fontWeight:600,flex:1}}>Generated CV</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(e=>!e)}>{editing?"Preview":"Edit"}</button>
            <button className="btn btn-ghost btn-sm" onClick={generate}>↻ Regenerate</button>
            <button className="btn btn-primary btn-sm">⬇ Export PDF</button>
          </div>
          {editing?

/* ─── INTERVIEW PRACTICE ─────────────────────────────────────── */
const InterviewPractice=({contextJob})=>{
  const [cat,setCat]=useState("Behavioural");
  const [qIdx,setQIdx]=useState(0);
  const [answer,setAnswer]=useState("");
  const [feedback,setFeedback]=useState("");
  const [loading,setLoading]=useState(false);
  const [chatHistory,setChatHistory]=useState([
    {role:"ai",text:"Hi! I'm your AI interview coach. Choose a question category, write your answer, and I'll give you detailed feedback. Let's ace that interview! 🎯"}
  ]);
  const [userInput,setUserInput]=useState("");
  const [chatLoading,setChatLoading]=useState(false);
  const qs=INTERVIEW_QS[cat]||[];
  const getQ=()=>qs[qIdx%qs.length];

  const getFeedback=async()=>{
    if(!answer.trim())return;
    setLoading(true);setFeedback("");
    const prompt=`You are an experienced interview coach. A candidate is interviewing for a ${contextJob?.title||"software engineering"} role at ${contextJob?.company||"a top tech company"}.

Question: "${getQ()}"
Their answer: "${answer}"

Give structured feedback with:
1. STRENGTHS (what they did well)
2. IMPROVEMENTS (specific things to add/change)
3. BETTER ANSWER TIPS (1-2 concrete suggestions)
4. STAR RATING (1-5 with brief justification)

Be constructive, specific, and encouraging.`;
    await callAI(prompt,setFeedback);
    setLoading(false);
  };
  const sendChat=async()=>{
    if(!userInput.trim()||chatLoading)return;
    const msg=userInput;setUserInput("");
    setChatHistory(h=>[...h,{role:"user",text:msg}]);
    setChatLoading(true);
    const context=chatHistory.slice(-4).map(m=>`${m.role==="ai"?"AI":"You"}: ${m.text}`).join("\n");
    const prompt=`You are an interview preparation AI coach. Context:\n${context}\n\nUser: ${msg}\n\nRespond as a helpful, encouraging interview coach. Keep responses focused and practical. Max 3 sentences.`;
    let resp="";
    await callAI(prompt,t=>{resp=t;});
    setChatHistory(h=>[...h,{role:"ai",text:resp}]);
    setChatLoading(false);
  };
  const formatFeedback=(text)=>text.split("\n").map((line,i)=>{
    if(/^\d\./.test(line))return <div key={i} style={{fontFamily:"Clash Display",fontWeight:600,marginTop:i>0?14:0,marginBottom:4,fontSize:14}}>{line}</div>;
    if(line.startsWith("- "))return <div key={i} className="flex gap-8 mb-4"><span style={{color:"var(--a1)"}}>·</span><span style={{color:"var(--t2)",fontSize:13,lineHeight:1.6}}>{line.slice(2)}</span></div>;
    if(line.trim()==="")return <div key={i} style={{height:4}}/>;
    return <div key={i} style={{color:"var(--t2)",fontSize:13,lineHeight:1.7}}>{line}</div>;
  });
  return(
    <div>
      <div className="flex gap-12 mb-4">
        <h2 style={{fontFamily:"Clash Display",fontSize:22,fontWeight:700}}>Interview Practice</h2>
        <AIBadge/>
      </div>
      {contextJob&&<div className="text-muted mb-16 text-sm">Preparing for: {contextJob.title} at {contextJob.company}</div>}
      <div className="grid-2" style={{gap:16}}>
        {/* Practice Panel */}
        <div>
          <div className="card" style={{padding:20,marginBottom:12}}>
            <div className="tabs" style={{marginBottom:16}}>
              {Object.keys(INTERVIEW_QS).map(c=>(
                <button key={c} className={`tab ${cat===c?"active":""}`} onClick={()=>{setCat(c);setQIdx(0);setAnswer("");setFeedback("");}}>
                  {c}
                </button>
              ))}
            </div>
            <div style={{background:"var(--bg4)",borderRadius:10,padding:16,marginBottom:14}}>
              <div className="text-xs text-muted mb-8">Question {(qIdx%qs.length)+1} of {qs.length}</div>
              <div style={{fontSize:15,fontWeight:500,lineHeight:1.6}}>{getQ()}</div>
            </div>
            <textarea value={answer} onChange={e=>setAnswer(e.target.value)} className="inp" placeholder="Type your answer here… Use the STAR method: Situation, Task, Action, Result" style={{height:140,resize:"none",marginBottom:12,lineHeight:1.7}}/>
            <div className="flex gap-8">
              <button onClick={getFeedback} disabled={loading||!answer.trim()} className="btn btn-primary" style={{flex:1,justifyContent:"center",opacity:(!answer.trim()||loading)?.6:1}}>
                {loading?<><Spinner size={14}/> Analysing…</>:"✦ Get AI Feedback"}
              </button>
              <button className="btn btn-ghost btn-sm" onClick={()=>{setQIdx(i=>i+1);setAnswer("");setFeedback("");}}>Next Q →</button>
            </div>
          </div>
          {feedback&&(
            <div className="card" style={{padding:20}}>
              <div style={{fontFamily:"Clash Display",fontWeight:600,marginBottom:12,display:"flex",alignItems:"center",gap:8}}><AIBadge/> Feedback</div>
              {formatFeedback(feedback)}
            </div>
          )}
        </div>

        {/* AI Chat Coach */}
        <div className="card" style={{padding:0,display:"flex",flexDirection:"column",height:520}}>
          <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border)"}}>
            <div style={{fontFamily:"Clash Display",fontWeight:600}}>AI Interview Coach</div>
            <div className="text-xs text-muted">Ask anything about interviewing</div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:10}}>
            {chatHistory.map((m,i)=>(
              <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                {m.role==="ai"&&<div className="avatar" style={{width:26,height:26,fontSize:11,marginRight:8,alignSelf:"flex-end",flexShrink:0}}>AI</div>}
                <div className={`chat-bubble ${m.role==="ai"?"ai":"user"}`}>{m.text}</div>
              </div>
            ))}
            {chatLoading&&<div className="flex gap-8"><div className="avatar" style={{width:26,height:26,fontSize:11}}>AI</div><div className="chat-bubble ai pulsing">…</div></div>}
          </div>
          <div style={{padding:12,borderTop:"1px solid var(--border)",display:"flex",gap:8}}>
            <input value={userInput} onChange={e=>setUserInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()} className="inp" placeholder="Ask your coach…" style={{flex:1}}/>
            <button onClick={sendChat} disabled={chatLoading} className="btn btn-primary btn-sm">Send</button>
          </div>
        </div>
      </div>
    </div>
  );
};

            <span style={{color:"var(--a3)",fontWeight:600,fontSize:13}}>{strength}%</span>
          </div>
          <div className="flex gap-3">
            {Array.from({length:10}).map((_,i)=>(
              <div key={i} className="strength-segment" style={{background:i<Math.floor(strength/10)?`hsl(${140-i*10},70%,50%)`:"var(--bg5)"}}/>
            ))}
          </div>
          {strength<100&&<div className="text-xs text-hint mt-6">Complete your profile to get better job matches</div>}
        </div>
      </div>

      <div className="tabs mb-0">
        {["personal","skills","preferences","links"].map(t=>(
          <button key={t} className={`tab ${tab===t?"active":""}`} onClick={()=>setTab(t)} style={{textTransform:"capitalize"}}>{t}</button>
        ))}
      </div>

      <div className="card" style={{padding:20,borderTopLeftRadius:0,borderTopRightRadius:0,borderTop:"none"}}>
        {tab==="personal"&&(
          <div>
            {editing?(
              <div>
                <div className="grid-2 mb-12">
                  {[["Name","name"],["Email","email"],["Phone","phone"],["Location","location"],["Degree","degree"],["University","university"],["Graduation Year","gradYear"],["Experience","experience"],["Salary Expectation","salary"]].map(([l,k])=>(
                    <div key={k} className="inp-group">
                      <label className="inp-label">{l}</label>
                      <input value={form[k]||""} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))} className="inp"/>
                    </div>
                  ))}
                </div>
                <div className="inp-group">
                  <label className="inp-label">Professional Bio</label>
                  <textarea value={form.bio||""} onChange={e=>setForm(p=>({...p,bio:e.target.value}))} className="inp" style={{height:90,resize:"none"}}/>
                </div>
              </div>
            ):(
              <div className="grid-2">
                {[["Email",profile.email],["Phone",profile.phone],["Location",profile.location],["Degree",profile.degree],["University",profile.university],["Graduation",profile.gradYear],["Experience",profile.experience],["Salary",profile.salary]].map(([l,v])=>(
                  <div key={l}>
                    <div className="inp-label mb-4">{l}</div>
                    <div className="text-sm">{v||<span className="text-hint">Not set</span>}</div>
                  </div>
                ))}
                <div style={{gridColumn:"1/-1"}}>
                  <div className="inp-label mb-4">Bio</div>
                  <div className="text-sm text-muted" style={{lineHeight:1.7}}>{profile.bio}</div>
                </div>
              </div>
            )}
          </div>
        )}

        {tab==="skills"&&(
          <div>
            <div style={{fontFamily:"Clash Display",fontWeight:600,marginBottom:12}}>Skills ({(editing?form:profile).skills.length})</div>
            <div className="flex gap-8 mb-16" style={{flexWrap:"wrap"}}>
              {(editing?form:profile).skills.map(s=>(
                <span key={s} className="badge badge-blue" style={{alignItems:"center",gap:6}}>
                  {s}
                  {editing&&<span onClick={()=>setForm(p=>({...p,skills:p.skills.filter(x=>x!==s)}))} style={{cursor:"pointer",opacity:.6,fontSize:10}}>✕</span>}
                </span>
              ))}
            </div>
            {editing&&(
              <div className="flex gap-8">
                <input value={newSkill} onChange={e=>setNewSkill(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSkill()} className="inp" placeholder="Add skill…" style={{flex:1}}/>
                <button onClick={addSkill} className="btn btn-primary btn-sm">Add</button>
              </div>
            )}
          </div>
        )}

        {tab==="preferences"&&(
          <div>
            <div className="mb-16">
              <div style={{fontFamily:"Clash Display",fontWeight:600,marginBottom:10}}>Job Types</div>
              <div className="flex gap-8" style={{flexWrap:"wrap"}}>
                {["Remote","Hybrid","On-site"].map(t=>{
                  const active=(editing?form:profile).jobTypes.includes(t);
                  return <button key={t} onClick={()=>editing&&setForm(p=>({...p,jobTypes:active?p.jobTypes.filter(x=>x!==t):[...p.jobTypes,t]}))} className="btn btn-sm" style={{background:active?"var(--a1)":"var(--bg5)",color:active?"white":"var(--t2)",border:active?"1px solid var(--a1)":"1px solid var(--border)",cursor:editing?"pointer":"default"}}>{t}</button>;
                })}
              </div>
            </div>
            <div>
              <div style={{fontFamily:"Clash Display",fontWeight:600,marginBottom:10}}>Industries</div>
              <div className="flex gap-8" style={{flexWrap:"wrap"}}>
                {["Technology","FinTech","SaaS","E-commerce","Gaming","Healthcare","AI/ML","Consulting"].map(ind=>{
                  const active=(editing?form:profile).industries.includes(ind);
                  return <button key={ind} onClick={()=>editing&&setForm(p=>({...p,industries:active?p.industries.filter(x=>x!==ind):[...p.industries,ind]}))} className="btn btn-sm" style={{background:active?"var(--a2)":"var(--bg5)",color:active?"white":"var(--t2)",border:active?"1px solid var(--a2)":"1px solid var(--border)",cursor:editing?"pointer":"default"}}>{ind}</button>;
                })}
              </div>
            </div>
          </div>
        )}

        {tab==="links"&&(
          <div className="grid-2">
            {editing?(
              [["LinkedIn","linkedin","🔗"],["GitHub","github","🐙"],["Portfolio","portfolio","🌐"]].map(([l,k,icon])=>(
                <div key={k} className="inp-group">
                  <label className="inp-label">{icon} {l}</label>
                  <input value={form[k]||""} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))} className="inp" placeholder={`your-${l.toLowerCase()}.com`}/>
                </div>
              ))
            ):(
              [["LinkedIn",profile.linkedin,"🔗"],["GitHub",profile.github,"🐙"],["Portfolio",profile.portfolio,"🌐"]].map(([l,v,icon])=>(
                <div key={l}>
                  <div className="inp-label mb-4">{icon} {l}</div>
                  <div className="text-sm" style={{color:v?"var(--a1)":"var(--t3)"}}>{v||"Not set"}</div>
                </div>
              ))
            )}
          </div>
        )}
      </div>
    </div>
  );
};

/* ─── TOPBAR ─────────────────────────────────────────────────── */
const Topbar=({page,apps,profile})=>{
  const titles={dashboard:"Dashboard",search:"Job Search",saved:"Saved Jobs",tracker:"Application Tracker",cv:"CV Builder",cover:"Cover Letter",insights:"Company Insights",practice:"Interview Practice",salary:"Salary Tool",profile:"My Profile"};
  const upcoming=apps.filter(a=>a.interview&&new Date(a.interview)>=new Date());
  return(
    <div className="topbar">
      <div style={{fontFamily:"Clash Display",fontSize:16,fontWeight:600,flex:1}}>{titles[page]||"Jobly"}</div>
      {upcoming.length>0&&(
        <div className="flex gap-6 badge badge-amber" style={{fontSize:12}}>
          📅 {upcoming.length} interview{upcoming.length>1?"s":""} upcoming
        </div>
      )}
      <div className="flex gap-10">
        <div className="avatar" style={{width:30,height:30,fontSize:12}}>{profile.name[0]}</div>
      </div>
    </div>
  );
};

/* ─── MAIN APP ───────────────────────────────────────────────── */
function App(){
  const [page,setPage]=useLocalStorage("jb_page","dashboard");
  const [jobs,setJobs]=useLocalStorage("jb_jobs",JOBS);
  const [apps,setApps]=useLocalStorage("jb_apps",INIT_APPS);
  const [profile,setProfile]=useLocalStorage("jb_profile",INIT_PROFILE);
  const [contextJob,setContextJob]=useState(null);
  const [detailJob,setDetailJob]=useState(null);
  const [collapsed,setCollapsed]=useState(false);

  const handleSelect=(job)=>setDetailJob(job);

  const renderPage=()=>{
    const p={jobs,setJobs,apps,setApps,profile,setProfile,setPage,setContextJob,contextJob,onSelect:handleSelect};
    switch(page){
      case "dashboard":return <Dashboard {...p}/>;
      case "search":return <JobSearch {...p}/>;
      case "saved":return <SavedJobs {...p}/>;
      case "tracker":return <AppTracker {...p}/>;
      case "cv":return <CVBuilder contextJob={contextJob} profile={profile}/>;
      case "cover":return <CoverLetter contextJob={contextJob} profile={profile}/>;
      case "insights":return <CompanyInsights contextJob={contextJob} jobs={jobs} setContextJob={setContextJob}/>;
      case "practice":return <InterviewPractice contextJob={contextJob}/>;
      case "salary":return <SalaryTool profile={profile}/>;
      case "profile":return <Profile profile={profile} setProfile={setProfile}/>;
      default:return null;
    }
  };

  return(
    <div className="app">
      <Sidebar page={page} setPage={setPage} apps={apps} collapsed={collapsed} setCollapsed={setCollapsed}/>
      <div className="main">
        <Topbar page={page} apps={apps} profile={profile}/>
        <div className="content fade-in" key={page}>
          {renderPage()}
        </div>
      </div>
      {detailJob&&(
        <JobDetailModal job={detailJob} onClose={()=>setDetailJob(null)} setPage={setPage} setContextJob={setContextJob} jobs={jobs} setJobs={setJobs}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
